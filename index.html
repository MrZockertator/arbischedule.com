<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO -->
  <title>Warframe Arbitration Schedule — Current &amp; Upcoming Rotations</title>
  <meta name="description" content="Live Warframe Arbitration schedule. See current and upcoming arbitration missions, nodes, factions, and countdowns. Filter by node, mission type, or faction."/>
  <meta name="keywords" content="warframe, arbitration, schedule, rotation, arbitrations, warframe arbitrations"/>
  <link rel="canonical" href="https://arbischedule.com/"/>

  <!-- Open Graph -->
  <meta property="og:title" content="Warframe Arbitration Schedule"/>
  <meta property="og:description" content="Live arbitration schedule with countdowns, node filtering, and timezone support."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://arbischedule.com/"/>

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Warframe Arbitration Schedule",
    "url": "https://arbischedule.com",
    "description": "Live Warframe Arbitration schedule. See current and upcoming arbitration missions, nodes, factions, and countdowns.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo-block">
      <h1>WARFRAME <span>ARBITRATIONS</span></h1>
      <p>arbischedule.com</p>
    </div>
    <div class="status-bar">
      <div class="refresh-info" id="refreshInfo">
        updated <span id="lastUpdated">—</span> · next in <span id="nextRefresh">—</span>
      </div>
      <div id="statusPill" class="status-pill">⟳ LOADING</div>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar: Node filter -->
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-header">
          <h2>Nodes</h2>
          <small id="nodeCount">—</small>
        </div>
        <div class="search-box">
          <input type="text" id="nodeSearch" placeholder="search nodes…" autocomplete="off"/>
        </div>
        <div class="node-list" id="nodeList">
          <div class="state-box" style="border:none; padding:30px 10px">
            <span class="spinner"></span> Loading…
          </div>
        </div>
        <div class="sidebar-actions">
          <button class="btn" id="btnAll">All</button>
          <button class="btn" id="btnNone">None</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-panel">
      <div class="results-header">
        <h2>Upcoming Arbitrations</h2>
        <span class="tz-label" id="tzLabel"></span>

        <div class="tz-combo" id="tzCombo">
          <div class="tz-input-wrap">
            <input type="text" id="tzInput" placeholder="override timezone" autocomplete="off"/>
            <button class="tz-clear" id="tzClear" title="Reset to local">✕</button>
          </div>
          <div class="tz-listbox" id="tzListbox"></div>
        </div>

        <div style="flex:1"></div>

        <span class="tz-label">Show next</span>
        <select id="daysSelect" class="days-select">
          <option value="7">7 days</option>
          <option value="14">14 days</option>
          <option value="30" selected>30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
          <option value="180">180 days</option>
          <option value="365">365 days</option>
        </select>
        <span id="resultCount" style="font-family:var(--mono);font-size:.78rem;color:var(--muted)">—</span>
      </div>

      <div id="tableWrap">
        <div class="state-box">
          <span class="spinner"></span> Fetching data…
        </div>
      </div>
    </main>

  </div>
</div>

<script defer src="/_vercel/insights/script.js"></script>
<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H"
        crossorigin="anonymous"></script>

<!-- App (ES modules) -->
<script type="module" src="/js/app.js"></script>

</body>
</html>
